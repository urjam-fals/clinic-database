<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset= "UTF-8">
        <meta name= "viewport" content="width=device-width, initial-scale=1.0">
        <title>Clinic Consultations Logging System</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <section class="page active" id="home-page">
            
            <div class="container">
                <h2>Clinic Consultations Logging System</h2>
                <form id="doctor-form">
                    <button type="submit" onclick="showPage('doctor-page')">Doctors Management</button>            
                </form>
                <form id="patient-form">
                    <button type="submit" onclick="showPage('patient-page')">Patients Management</button>
                </form>
                <form id="consultation-form">
                    <button type="submit" onclick="showPage('consultation-page')">Consultation Transaction Management</button>  
                </form>   
            </div>
    
        </section>
        
        <section class="page" id="doctor-page">
            <div class="container">
                <div class="search-box">
                    <button type="button" onclick="showPage('home-page')">← Back</button>
                    <input type="search" id="search-doctor" placeholder="Search doctor...">
                    <button type="button" onclick="showPage('doctor-add-page')">+ Add Doctor</button>
                </div>
            
                
                <h2>Doctor List</h2>
                <table class="doctor-table">
                    <thead>
                        <tr>
                            <th>ID Number</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Address</th>
                            <th>Specialization</th>
                        </tr>
                    </thead>
                    <tbody id="doctor-list">
                        <!-- Doctor data will be populated here -->
                    </tbody>
                </table>
                    <!-- <ul id="output"></ul> -->                
            </div>
        </section>

        <section class="page" id="doctor-add-page">
            <div class="container">
                
                <h2>Add New Doctor</h2>
                <form id="add-doctor-form">
                    <input type="text" id="docFname" placeholder="First Name" required>
                    <input type="text" id="docLname" placeholder="Last Name" required>
                    <input type="text" id="docAddr" placeholder="Address" required>
                    <input type="text" id="docSpecial" placeholder="Specialization" required>
                    <button type="submit">Add Doctor</button>
                </form>

                <button type="button" onclick="showPage('doctor-page')">← Back</button>
            </div>

        </section>

        <section class="page" id="patient-page">
            <div class="container">
                <button type="submit" onclick="showPage('home-page')">←</button>
                <table class="patient-table">
                    <thead>
                        <tr>
                            <th>ID Number</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Birthdate</th>
                            <th>Telephone Number</th>
                        </tr>
                    </thead>
                    <tbody id="patient-list">
                        <!-- Patient data will be populated here -->
                    </tbody>
                </table>
            </div>
            
        </section>
        
        <section class="page" id="consultation-page">
            <div class="container">
                <button type="submit" onclick="showPage('home-page')">←</button>
                <!-- <form id="consultation-form">

                </form> -->
                <table class="consultation-table">
                    <thead>
                        <tr>
                            <th>ID Number</th>
                            <th>Patient ID No.</th>
                            <th>Doctor ID No.</th>
                            <th>Consult Date</th>
                            <th>Diagnosis</th>
                            <th>Prescription</th>
                        </tr>
                    </thead>
                    <tbody id="consultation-list">
                        <!-- Consultation data will be populated here -->
                    </tbody>
                </table>
            </div>
        </section>

        <script src= "app.js"></script>
    </body>
</html>
